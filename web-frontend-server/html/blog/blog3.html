<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Âm nhạc & cảm hứng mỗi ngày</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: #ffffff;
            color: #333;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            color: white;
        }

        .header h1 {
            font-size: 28px;
        }

        .content {
            padding: 30px;
        }

        .content p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .section-title {
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .artists {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .artist-card {
            width: 280px;
            background: #f1f2f6;
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
        }

        .artist-card:hover {
            transform: translateY(-5px);
        }

        .artist-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .artist-card h3 {
            margin: 10px 0;
        }

        .songs {
            padding: 10px;
        }

        .songs a {
            display: block;
            text-decoration: none;
            color: #0984e3;
            margin: 5px 0;
        }

        .songs a:hover {
            text-decoration: underline;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border-radius: 25px;
            text-decoration: none;
        }

        .btn:hover {
            background: #c0392b;
        }

        .footer {
            text-align: center;
            padding: 20px;
        }

    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎵 Âm nhạc & cảm hứng mỗi ngày</h1>
    </div>

    <div class="content">
        <p>Âm nhạc là một phần không thể thiếu...</p>

        <h3 class="section-title">🎤 Nghệ sĩ & bài hát yêu thích</h3>

        <div class="artists" id="artist-list">
            <p style="color: #666;">Đang kết nối tới Database Server...</p>
        </div>

        </div>

    <div class="footer">
        <a href="../" class="btn">← Quay về trang chủ</a>
    </div>
</div>

<script>
    async function showMusic() {
        const API_URL = "http://localhost:5110/api/music";
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            const container = document.getElementById('artist-list');
            container.innerHTML = ''; // Xóa chữ "Loading"

            data.forEach(artist => {
                const card = `
                    <div class="artist-card">
                        <img src="${artist.imageUrl}" alt="${artist.name}">
                        <h3>${artist.name}</h3>
                        <div class="songs">
                            ${artist.songs.map(s => `
                                <a href="${s.url}" target="_blank">${s.title}</a>
                            `).join('')}
                        </div>
                    </div>`;
                container.innerHTML += card;
            });
        } catch (err) {
            console.error("Lỗi:", err);
            document.getElementById('artist-list').innerHTML = "Lỗi kết nối API. Kiểm tra Console F12!";
        }
    }
    window.onload = showMusic;
</script>

</body>
</html>
